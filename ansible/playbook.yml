---
# NanoClaw deployment playbook for a plain Linux VM (replaces AKS).
#
# Prerequisites:
#   - Azure CLI installed and logged in (`az login`) on the control machine
#   - SSH access to the target VM
#   - The VM already exists in Azure (created via portal, Terraform, etc.)
#
# Usage:
#   cp inventory.example.ini inventory.ini   # fill in your VM IP
#   ansible-playbook -i inventory.ini playbook.yml
#
# Secrets (API keys, OAuth tokens) are set manually in Key Vault via the
# Azure portal or CLI — never stored in this repo. The playbook only provisions
# the vault and wires up the VM's managed identity to access it.
# Non-secret config (ASSISTANT_NAME, TZ, etc.) goes in nanoclaw_env_vars below.
#
# To set a secret after running this playbook:
#   az keyvault secret set --vault-name nanoclaw-kv --name ANTHROPIC-API-KEY --value "sk-ant-..."

# ── Play 1: Provision Azure Key Vault and wire up managed identity ────────────
# Runs on the control machine via Azure CLI. Safe to re-run (idempotent).

- name: Provision Azure Key Vault
  hosts: nanoclaw
  gather_facts: false

  vars:
    azure_resource_group: nanoclaw-rg
    azure_location: uksouth
    keyvault_name: nanoclaw-kv
    vm_name: "{{ inventory_hostname }}"

  tasks:
    - name: Assign system-managed identity to VM
      command: >
        az vm identity assign
        --resource-group {{ azure_resource_group }}
        --name {{ vm_name }}
      delegate_to: localhost
      register: identity_result
      changed_when: true

    - name: Get VM principal ID
      command: >
        az vm show
        --resource-group {{ azure_resource_group }}
        --name {{ vm_name }}
        --query identity.principalId
        --output tsv
      delegate_to: localhost
      register: vm_principal_id
      changed_when: false

    - name: Create Key Vault (RBAC mode)
      command: >
        az keyvault create
        --name {{ keyvault_name }}
        --resource-group {{ azure_resource_group }}
        --location {{ azure_location }}
        --enable-rbac-authorization true
      delegate_to: localhost
      register: kv_create
      changed_when: kv_create.rc == 0
      failed_when: kv_create.rc != 0 and 'already exists' not in kv_create.stderr

    - name: Get Key Vault resource ID
      command: >
        az keyvault show
        --name {{ keyvault_name }}
        --query id
        --output tsv
      delegate_to: localhost
      register: keyvault_id
      changed_when: false

    - name: Get Key Vault URI
      command: >
        az keyvault show
        --name {{ keyvault_name }}
        --query properties.vaultUri
        --output tsv
      delegate_to: localhost
      register: keyvault_uri
      changed_when: false

    - name: Grant VM identity Key Vault Secrets User role
      command: >
        az role assignment create
        --assignee {{ vm_principal_id.stdout | trim }}
        --role "Key Vault Secrets User"
        --scope {{ keyvault_id.stdout | trim }}
      delegate_to: localhost
      register: role_assignment
      changed_when: role_assignment.rc == 0
      failed_when: role_assignment.rc != 0 and 'already exists' not in role_assignment.stderr

    # Make the vault URI available to the VM play
    - name: Expose Key Vault URI as host fact
      set_fact:
        nanoclaw_keyvault_uri: "{{ keyvault_uri.stdout | trim }}"

# ── Play 2: Configure the VM and deploy NanoClaw ─────────────────────────────

- name: Deploy NanoClaw
  hosts: nanoclaw
  become: true

  vars:
    deploy_user: nanoclaw
    deploy_home: /home/nanoclaw
    project_root: "{{ deploy_home }}/nanoclaw"
    repo_url: "https://github.com/jxrrdan/nanoclaw.git"
    repo_branch: main
    node_version: "22"

    # Non-secret config written to .env. Secrets go to Key Vault above.
    nanoclaw_env_vars:
      ASSISTANT_NAME: Andy
      ASSISTANT_HAS_OWN_NUMBER: "false"
      # TZ: Europe/London

  tasks:
    # ── System packages ──────────────────────────────────────────────

    - name: Install system dependencies
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - gnupg
          - build-essential
          - python3-pip
        state: present
        update_cache: true

    # ── Node.js 22 via NodeSource ─────────────────────────────────────

    - name: Add NodeSource GPG key
      apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    # ── Docker CE ────────────────────────────────────────────────────

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    # ── Deploy user ──────────────────────────────────────────────────

    - name: Create deploy user
      user:
        name: "{{ deploy_user }}"
        home: "{{ deploy_home }}"
        shell: /bin/bash
        groups: docker
        append: true

    # ── Repo ─────────────────────────────────────────────────────────

    - name: Clone or update repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_root }}"
        version: "{{ repo_branch }}"
        force: false
      become_user: "{{ deploy_user }}"

    - name: Install npm dependencies
      command: npm ci
      args:
        chdir: "{{ project_root }}"
      become_user: "{{ deploy_user }}"

    - name: Build TypeScript
      command: npm run build
      args:
        chdir: "{{ project_root }}"
      become_user: "{{ deploy_user }}"

    # ── Agent container image ─────────────────────────────────────────

    - name: Build agent container image
      command: ./container/build.sh
      args:
        chdir: "{{ project_root }}"
      become_user: "{{ deploy_user }}"

    # ── Data directories ──────────────────────────────────────────────

    - name: Create runtime directories
      file:
        path: "{{ project_root }}/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0750"
      loop:
        - store
        - groups
        - data
        - logs

    # ── Environment ───────────────────────────────────────────────────

    - name: Write non-secret config to .env
      lineinfile:
        path: "{{ project_root }}/.env"
        line: "{{ item.key }}={{ item.value }}"
        regexp: "^{{ item.key }}="
        create: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      loop: "{{ nanoclaw_env_vars | dict2items }}"

    - name: Write AZURE_KEYVAULT_URL to .env
      lineinfile:
        path: "{{ project_root }}/.env"
        line: "AZURE_KEYVAULT_URL={{ nanoclaw_keyvault_uri }}"
        regexp: "^AZURE_KEYVAULT_URL="
      when: nanoclaw_keyvault_uri is defined

    # ── Systemd service ───────────────────────────────────────────────

    - name: Install systemd service
      template:
        src: "{{ playbook_dir }}/../systemd/nanoclaw.service"
        dest: /etc/systemd/system/nanoclaw.service
        mode: "0644"
      vars:
        DEPLOY_USER: "{{ deploy_user }}"
        DEPLOY_HOME: "{{ deploy_home }}"
        PROJECT_ROOT: "{{ project_root }}"
      notify: Reload systemd and restart nanoclaw

    - name: Enable and start nanoclaw
      systemd:
        name: nanoclaw
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd and restart nanoclaw
      systemd:
        name: nanoclaw
        state: restarted
        daemon_reload: true
