---
# NanoClaw deployment playbook for a plain Linux VM (replaces AKS).
#
# Usage:
#   cp inventory.example.ini inventory.ini   # fill in your VM IP
#   ansible-playbook -i inventory.ini playbook.yml
#
# The playbook installs Node.js 22, Docker CE, clones the repo, builds
# the agent container image, and runs NanoClaw as a systemd service.
#
# Secrets are read from .env on the host — copy your existing .env to
# {{ deploy_home }}/.nanoclaw.env before running, or set it via the
# nanoclaw_env_vars dict below and the playbook will write it.

- name: Deploy NanoClaw
  hosts: nanoclaw
  become: true

  vars:
    deploy_user: nanoclaw
    deploy_home: /home/nanoclaw
    project_root: "{{ deploy_home }}/nanoclaw"
    repo_url: "https://github.com/jxrrdan/nanoclaw.git"
    repo_branch: main
    node_version: "22"

    # Optional: set these to have the playbook write the .env file.
    # Leave empty to manage .env manually on the server.
    # nanoclaw_env_vars:
    #   ASSISTANT_NAME: Andy
    #   ASSISTANT_HAS_OWN_NUMBER: "false"
    #   ANTHROPIC_API_KEY: "sk-ant-..."
    nanoclaw_env_vars: {}

  tasks:
    # ── System packages ──────────────────────────────────────────────

    - name: Install system dependencies
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - gnupg
          - build-essential
          - python3-pip
        state: present
        update_cache: true

    # ── Node.js 22 via NodeSource ─────────────────────────────────────

    - name: Add NodeSource GPG key
      apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    # ── Docker CE ────────────────────────────────────────────────────

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    # ── Deploy user ──────────────────────────────────────────────────

    - name: Create deploy user
      user:
        name: "{{ deploy_user }}"
        home: "{{ deploy_home }}"
        shell: /bin/bash
        groups: docker
        append: true

    # ── Repo ─────────────────────────────────────────────────────────

    - name: Clone or update repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_root }}"
        version: "{{ repo_branch }}"
        force: false
      become_user: "{{ deploy_user }}"

    - name: Install npm dependencies
      command: npm ci
      args:
        chdir: "{{ project_root }}"
      become_user: "{{ deploy_user }}"

    - name: Build TypeScript
      command: npm run build
      args:
        chdir: "{{ project_root }}"
      become_user: "{{ deploy_user }}"

    # ── Agent container image ─────────────────────────────────────────

    - name: Build agent container image
      command: ./container/build.sh
      args:
        chdir: "{{ project_root }}"
      become_user: "{{ deploy_user }}"

    # ── Data directories ──────────────────────────────────────────────

    - name: Create runtime directories
      file:
        path: "{{ project_root }}/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0750"
      loop:
        - store
        - groups
        - data
        - logs

    # ── Environment ───────────────────────────────────────────────────

    - name: Write .env file
      lineinfile:
        path: "{{ project_root }}/.env"
        line: "{{ item.key }}={{ item.value }}"
        regexp: "^{{ item.key }}="
        create: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      loop: "{{ nanoclaw_env_vars | dict2items }}"
      when: nanoclaw_env_vars | length > 0
      no_log: true

    - name: Ensure .env exists
      file:
        path: "{{ project_root }}/.env"
        state: touch
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"

    # ── Systemd service ───────────────────────────────────────────────

    - name: Install systemd service
      template:
        src: "{{ playbook_dir }}/../systemd/nanoclaw.service"
        dest: /etc/systemd/system/nanoclaw.service
        mode: "0644"
      vars:
        DEPLOY_USER: "{{ deploy_user }}"
        DEPLOY_HOME: "{{ deploy_home }}"
        PROJECT_ROOT: "{{ project_root }}"
      notify: Reload systemd

    - name: Enable and start nanoclaw
      systemd:
        name: nanoclaw
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true
